name: EKS Infrastructure

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VAR_loki_s3_bucket:    ${{ secrets.TF_VAR_LOKI_S3_BUCKET }}
  TF_VAR_create_nat_gateway: "true"

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=eks-infra/state.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Print outputs
        run: |
          echo "=== Terraform Outputs ==="
          echo "Cluster name:      $(terraform output -raw cluster_name)"
          echo "Loki IAM role ARN: $(terraform output -raw loki_iam_role_arn)"
          echo "Loki S3 bucket:    $(terraform output -raw loki_s3_bucket)"
          echo "Kubeconfig cmd:    $(terraform output -raw kubeconfig_command)"
